name: CI

on:
  push:
    branches: ["main", "build/**"]
    # Inert paths that never affect typecheck/lint/test/build. A push is
    # skipped only when EVERY changed file matches, so mixed code+docs
    # commits still run. Chief case: the passive .beads/ export sync.
    paths-ignore:
      - ".beads/**"
      - ".claude/**"
      - ".agents/**"
      - ".codex/**"
      - "docs/**"
      - "*.md"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - ".beads/**"
      - ".claude/**"
      - ".agents/**"
      - ".codex/**"
      - "docs/**"
      - "*.md"

# Supersede in-flight runs for the same ref (rapid pushes / PR force-pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm must be available before setup-node's pnpm cache step.
      # action-setup reads the version from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck (src)
        run: pnpm typecheck

      - name: Typecheck (tests)
        run: pnpm typecheck:test

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
